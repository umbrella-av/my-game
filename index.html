<!DOCTYPE html>
<html>
<head>
<title>Impossible Challenge</title>

<style>
body{
    background:#c89cff;
    text-align:center;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

h1{
    margin-top:100px;
    color:white;
}

button{
    padding:12px 25px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#yes{
    background:white;
}

#no{
    position:absolute;
    background:#8a2be2;
    color:white;
}

.heart{
    position:absolute;
    color:#800080;
    font-size:30px;
}
</style>
</head>

<body>

<div class="heart" style="top:5%;left:10%;">💜</div>
<div class="heart" style="top:15%;left:80%;">💜</div>
<div class="heart" style="top:40%;left:20%;">💜</div>
<div class="heart" style="top:60%;left:75%;">💜</div>
<div class="heart" style="top:80%;left:30%;">💜</div>
<div class="heart" style="top:30%;left:55%;">💜</div>

<h1>Can u buy me a cone icecream 🍦?</h1>

<button id="yes"
onclick="alert('😂 Thank you!')">
YES
</button>

<button id="no">NO</button>

<script>
const noBtn = document.getElementById("no");

function moveButton(){
    noBtn.style.left =
      Math.random() * (window.innerWidth - 120) + "px";
    noBtn.style.top =
      Math.random() * (window.innerHeight - 80) + "px";
}

moveButton();

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("click", moveButton);
</script>

</body>
</html>
